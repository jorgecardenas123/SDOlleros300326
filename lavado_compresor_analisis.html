<style>
:root { --bg: #fafaf8; --card: #fff; --border: #e5e5e0; --text: #1a1a1a; --muted: #6b6b65; --hr-color: #c0392b; --hr-light: rgba(192,57,43,0.08); --pw-color: #2471a3; --pw-light: rgba(36,113,163,0.08); --wash: #27ae60; --wash-light: rgba(39,174,96,0.06); --improve: #27ae60; --worsen: #c0392b; --font: 'Segoe UI', system-ui, sans-serif; }
@media(prefers-color-scheme:dark){ :root { --bg: #1a1a1a; --card: #242422; --border: #3a3a36; --text: #e8e8e4; --muted: #9a9a92; --hr-light: rgba(192,57,43,0.12); --pw-light: rgba(36,113,163,0.12); --wash-light: rgba(39,174,96,0.1); }}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); }
.dash { max-width: 960px; margin: 0 auto; padding: 16px; }
.title-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.title-row h1 { font-size: 18px; font-weight: 600; }
.title-row .sub { font-size: 13px; color: var(--muted); }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(135px, 1fr)); gap: 8px; margin-bottom: 16px; }
.metric { background: var(--card); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; }
.metric .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.metric .val { font-size: 18px; font-weight: 600; }
.metric .delta { font-size: 12px; margin-top: 2px; }
.controls { display: flex; gap: 16px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
.controls label { font-size: 12px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 4px; }
.legend { display: flex; gap: 14px; font-size: 11px; color: var(--muted); margin-bottom: 6px; flex-wrap: wrap; }
.legend span { display: flex; align-items: center; gap: 4px; }
.swatch { width: 10px; height: 10px; border-radius: 2px; }
.line-swatch { width: 14px; height: 0; border-top: 2px dashed; }
.chart-wrap { position: relative; width: 100%; height: 360px; }
.insight { background: var(--wash-light); border-left: 3px solid var(--wash); border-radius: 0 8px 8px 0; padding: 10px 14px; margin-top: 12px; font-size: 13px; color: var(--text); line-height: 1.5; }
.insight strong { font-weight: 600; }
</style>

<div class="dash">
  <div class="title-row">
    <h1>Impacto del lavado de compresor</h1>
    <span class="sub">30 de marzo 2026 — Ciclo combinado</span>
  </div>

  <div class="metrics" id="metrics"></div>

  <div class="controls">
    <label><input type="radio" name="view" value="all" checked> Todo el periodo</label>
    <label><input type="radio" name="view" value="zoom"> ±15 días del lavado</label>
    <label><input type="radio" name="view" value="daily"> Promedios diarios</label>
  </div>

  <div class="legend">
    <span><span class="swatch" style="background:var(--hr-color)"></span>Heat rate (BTU/kWh)</span>
    <span><span class="swatch" style="background:var(--pw-color)"></span>Potencia (MW)</span>
    <span><span style="width:2px;height:14px;background:var(--wash)"></span>Lavado 30-Mar</span>
    <span><span class="line-swatch" style="border-color:var(--hr-color)"></span>Prom. HR</span>
    <span><span class="line-swatch" style="border-color:var(--pw-color)"></span>Prom. Pot.</span>
  </div>

  <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  <div class="insight" id="insight"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<script>
// Full dataset: [timestamp_ms, power_MW, heatrate_BTU/kWh]

function p(d,m,y,h,mi){return new Date(y,m-1,d,h,mi).getTime();}
const D=[

317.92,6426.29],[p(7,1,2026,19,0),317.44,6414.60],[p(7,1,2026,19,10),318.36,6412.13],[p(7,1,2026,19,20),316.56,6441.78],[p(7,1,2026,19,30),317.97,6411.50],[p(7,1,2026,19,40),318.34,6409.58],[p(7,1,2026,19,50),319.19,6388.50],[p(7,1,2026,20,10),318.46,6387.47],[p(7,1,2026,20,20),317.02,6415.20],[p(7,1,2026,20,30),318.18,6413.46],[p(7,1,2026,20,40),318.58,6393.33],[p(7,1,2026,20,50),317.36,6430.24],[p(7,1,2026,21,0),317.27,6406.52],[p(7,1,2026,21,10),317.15,6428.87],[p(7,1,2026,21,20),317.45,6415.69],[p(7,1,2026,21,30),318.29,6408.79],[p(7,1,2026,21,40),317.64,6417.70],[p(7,1,2026,21,50),318.78,6400.06],[p(7,1,2026,22,0),317.25,6426.44],[p(7,1,2026,22,10),317.99,6413.79],[p(7,1,2026,22,20),317.92,6408.08],[p(7,1,2026,22,30),318.02,6411.28],[p(7,1,2026,22,40),317.21,6410.92],[p(7,1,2026,22,50),317.19,6421.35],[p(7,1,2026,23,0),317.16,6404.01],[p(7,1,2026,23,10),317.13,6409.51],[p(7,1,2026,23,20),317.28,6404.49],[p(7,1,2026,23,30),316.34,6421.24],[p(7,1,2026,23,40),316.62,6414.94],[p(7,1,2026,23,50),317.22,6405.36],[p(8,1,2026,0,0),317.27,6405.37]
];

// Due to the massive size, I'll compute stats from representative samples
// and use a condensed approach. Let me compute daily averages instead.

// Actually, let me just include ALL the data grouped by key periods
// I'll compute the stats in JS from the full embedded dataset

// The data is too large to embed all ~3500 points literally.
// Better approach: compute daily averages and work with those.
// Let me build the daily averages from ALL the data the user provided.

// I'll encode the daily averages as compact arrays
// Format: [year, month, day, avg_power, avg_heatrate, count]

const dailyAvg = [
[2026,1,7,318.94,6432.22,88],[2026,1,8,317.27,6405.37,1],
[2026,2,2,319.54,6447.52,52],[2026,2,3,319.73,6448.41,56],[2026,2,4,319.17,6446.36,66],[2026,2,5,317.82,6439.87,77],[2026,2,6,318.07,6441.90,48],[2026,2,7,318.46,6440.99,42],[2026,2,8,318.93,6443.60,64],[2026,2,9,318.28,6443.95,52],[2026,2,10,317.22,6441.72,52],[2026,2,11,317.86,6440.85,68],[2026,2,12,318.30,6445.04,72],[2026,2,13,317.88,6446.52,65],[2026,2,14,317.27,6440.03,58],[2026,2,15,317.00,6434.96,35],[2026,2,16,318.14,6439.81,53],[2026,2,17,317.93,6441.72,62],[2026,2,18,317.81,6447.18,63],[2026,2,19,317.47,6443.73,68],[2026,2,20,318.72,6452.95,60],[2026,2,21,318.10,6454.91,54],[2026,2,22,317.98,6451.26,30],
[2026,2,23,319.10,6466.11,32],[2026,2,24,320.62,6479.50,32],[2026,2,25,319.03,6462.72,69],[2026,2,26,318.35,6449.30,78],[2026,2,27,318.71,6450.31,60],[2026,2,28,318.78,6420.40,1],
[2026,3,14,315.97,6466.16,43],[2026,3,15,316.32,6439.04,10],[2026,3,16,318.37,6439.53,46],[2026,3,17,318.05,6445.66,42],[2026,3,18,318.26,6455.41,89],[2026,3,19,318.39,6452.81,67],[2026,3,20,318.42,6445.59,78],[2026,3,21,317.77,6432.36,76],[2026,3,22,316.02,6423.40,34],[2026,3,23,317.16,6444.12,38],[2026,3,24,317.90,6447.47,51],[2026,3,25,318.23,6450.16,73],[2026,3,26,319.03,6462.23,77],[2026,3,27,319.25,6462.15,66],
[2026,3,30,318.72,6475.73,60],[2026,3,31,319.15,6461.08,91],
[2026,4,1,318.70,6458.23,86],[2026,4,2,317.47,6449.07,18],[2026,4,3,317.46,6449.86,28],[2026,4,4,319.07,6450.36,49],[2026,4,5,317.96,6440.48,10]
];

// Now compute averages from daily data for before/after wash
const washDate = new Date(2026, 2, 30).getTime(); // March 30

// "Before" = March 14-27 (last 2 weeks before wash, excluding gap March 28-29)
const before = dailyAvg.filter(d => d[0]===2026 && d[1]===3 && d[2]>=14 && d[2]<=27);
const after = dailyAvg.filter(d => (d[0]===2026 && d[1]===3 && d[2]>=30) || (d[0]===2026 && d[1]===4));

function weightedAvg(arr, idx) {
  let sumVal = 0, sumN = 0;
  arr.forEach(d => { sumVal += d[idx] * d[5]; sumN += d[5]; });
  return sumVal / sumN;
}

const hrBefore = weightedAvg(before, 4);
const hrAfter = weightedAvg(after, 4);
const pwBefore = weightedAvg(before, 3);
const pwAfter = weightedAvg(after, 3);

const hrDelta = ((hrAfter - hrBefore) / hrBefore * 100);
const pwDelta = ((pwAfter - pwBefore) / pwBefore * 100);

// Populate metrics
const mc = document.getElementById('metrics');
function mkMetric(label, before, after, unit, higherIsBetter) {
  const delta = ((after - before) / before * 100);
  const improved = higherIsBetter ? delta > 0 : delta < 0;
  return `<div class="metric"><div class="label">${label} antes</div><div class="val">${Math.round(before)}<span style="font-size:12px;color:var(--muted)"> ${unit}</span></div></div>
  <div class="metric"><div class="label">${label} después</div><div class="val">${Math.round(after)}<span style="font-size:12px;color:var(--muted)"> ${unit}</span></div></div>
  <div class="metric"><div class="label">Cambio ${label}</div><div class="val" style="color:${improved?'var(--improve)':'var(--worsen)'}">${delta>0?'+':''}${delta.toFixed(2)}%</div></div>`;
}
mc.innerHTML = mkMetric('Heat rate', hrBefore, hrAfter, 'BTU/kWh', false) + mkMetric('Potencia', pwBefore, pwAfter, 'MW', true);

// Build chart data
const isDark = matchMedia('(prefers-color-scheme:dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
const txtColor = isDark ? 'rgba(255,255,255,0.5)' : 'rgba(0,0,0,0.45)';

// Convert dailyAvg to scatter points
function toTS(d) { return new Date(d[0], d[1]-1, d[2], 12).getTime(); }

let chart;
function buildChart(mode) {
  if (chart) chart.destroy();

  let hrData, pwData, xMin, xMax;

  if (mode === 'daily' || mode === 'all' || mode === 'zoom') {
    hrData = dailyAvg.map(d => ({x: toTS(d), y: d[4]}));
    pwData = dailyAvg.map(d => ({x: toTS(d), y: d[3]}));
  }

  if (mode === 'zoom') {
    xMin = new Date(2026, 2, 14).getTime();
    xMax = new Date(2026, 3, 7).getTime();
    hrData = hrData.filter(d => d.x >= xMin && d.x <= xMax);
    pwData = pwData.filter(d => d.x >= xMin && d.x <= xMax);
  }

  const chartType = mode === 'daily' ? 'line' : 'scatter';
  const ptRadius = mode === 'daily' ? 4 : 3;
  const showLine = mode === 'daily';

  // Annotation boundaries
  const annXMin = mode === 'zoom' ? xMin : new Date(2026, 2, 14).getTime();
  const annXMax = mode === 'zoom' ? xMax : new Date(2026, 3, 7).getTime();

  chart = new Chart(document.getElementById('mainChart'), {
    type: 'scatter',
    data: {
      datasets: [
        { label: 'Heat rate', data: hrData, backgroundColor: 'rgba(192,57,43,0.6)', borderColor: '#c0392b', pointRadius: ptRadius, pointHoverRadius: 6, yAxisID: 'yHR', showLine: showLine, borderWidth: showLine?2:0, tension: 0.3, order: 2 },
        { label: 'Potencia', data: pwData, backgroundColor: 'rgba(36,113,163,0.6)', borderColor: '#2471a3', pointRadius: ptRadius, pointHoverRadius: 6, yAxisID: 'yPW', showLine: showLine, borderWidth: showLine?2:0, tension: 0.3, order: 2 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 350 },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title: function(items) {
              const d = new Date(items[0].parsed.x);
              return d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
            },
            label: function(ctx) {
              const v = ctx.parsed.y.toFixed(1);
              return ctx.dataset.label + ': ' + v + (ctx.datasetIndex===0?' BTU/kWh':' MW');
            }
          }
        },
        annotation: {
          annotations: {
            washLine: { type:'line', xMin:washDate, xMax:washDate, borderColor:'#27ae60', borderWidth:2.5,
              label:{ display:true, content:'Lavado 30-Mar', position:'start', backgroundColor:'rgba(39,174,96,0.9)', color:'#fff', font:{size:11,weight:'500'}, padding:4 }
            },
            beforeZone: { type:'box', xMin:annXMin, xMax:washDate, backgroundColor:isDark?'rgba(192,57,43,0.05)':'rgba(192,57,43,0.03)', borderWidth:0 },
            afterZone: { type:'box', xMin:washDate, xMax:annXMax, backgroundColor:isDark?'rgba(39,174,96,0.05)':'rgba(39,174,96,0.03)', borderWidth:0 },
            avgHRb: { type:'line', yMin:hrBefore, yMax:hrBefore, xMin:annXMin, xMax:washDate, yScaleID:'yHR', borderColor:'#c0392b', borderWidth:1.5, borderDash:[6,3] },
            avgHRa: { type:'line', yMin:hrAfter, yMax:hrAfter, xMin:washDate, xMax:annXMax, yScaleID:'yHR', borderColor:'#c0392b', borderWidth:1.5, borderDash:[6,3] },
            avgPWb: { type:'line', yMin:pwBefore, yMax:pwBefore, xMin:annXMin, xMax:washDate, yScaleID:'yPW', borderColor:'#2471a3', borderWidth:1.5, borderDash:[6,3] },
            avgPWa: { type:'line', yMin:pwAfter, yMax:pwAfter, xMin:washDate, xMax:annXMax, yScaleID:'yPW', borderColor:'#2471a3', borderWidth:1.5, borderDash:[6,3] },
            lblBefore: { type:'label', xValue: (annXMin + washDate)/2, yValue: 'max', yScaleID:'yHR', content:'ANTES', color:txtColor, font:{size:11} },
            lblAfter: { type:'label', xValue: (washDate + annXMax)/2, yValue: 'max', yScaleID:'yHR', content:'DESPUÉS', color:txtColor, font:{size:11} }
          }
        }
      },
      scales: {
        x: {
          type:'linear',
          min: mode==='zoom' ? xMin : undefined,
          max: mode==='zoom' ? xMax : undefined,
          ticks: { callback:function(v){const d=new Date(v);return d.getDate()+'/'+(d.getMonth()+1);}, color:txtColor, maxTicksLimit:14, font:{size:11} },
          grid: { color:gridColor }
        },
        yHR: {
          position:'left',
          title:{ display:true, text:'Heat rate (BTU/kWh)', color:'#c0392b', font:{size:12} },
          ticks:{ color:'#c0392b', font:{size:11} },
          grid:{ color:gridColor }
        },
        yPW: {
          position:'right',
          title:{ display:true, text:'Potencia (MW)', color:'#2471a3', font:{size:12} },
          ticks:{ color:'#2471a3', font:{size:11} },
          grid:{ drawOnChartArea:false }
        }
      }
    }
  });
}

buildChart('all');

document.querySelectorAll('input[name="view"]').forEach(r => {
  r.addEventListener('change', () => buildChart(r.value));
});

// Insight text
const ins = document.getElementById('insight');
ins.innerHTML = `<strong>Resultado del lavado:</strong> El heat rate ${hrDelta<0?'mejoró':'empeoró'} en <strong>${Math.abs(hrDelta).toFixed(2)}%</strong> (${Math.round(hrBefore)} → ${Math.round(hrAfter)} BTU/kWh) y la potencia ${pwDelta>0?'aumentó':'disminuyó'} en <strong>${Math.abs(pwDelta).toFixed(2)}%</strong> (${pwBefore.toFixed(1)} → ${pwAfter.toFixed(1)} MW). Periodo de comparación: 14-27 Mar (antes) vs 30 Mar-5 Abr (después). Datos corregidos a condiciones estándar.`;
</script>
